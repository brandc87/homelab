---
- name: Basic provisioning test
  hosts: test
  become: false

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install curl
      apt:
        name: curl
        state: present

    - name: Confirm curl works
      command: curl --version
      register: curl_output
      changed_when: false

    - name: Show curl version
      debug:
        var: curl_output.stdout_lines
