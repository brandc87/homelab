---
- name: Set timezone
  timezone:
    name: "{{ bootstrap_timezone }}"
  become: true

- name: Disable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
  become: true
  notify: restart sshd
  when: bootstrap_disable_password_auth

- name: Disable root password login (key-only)
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
  become: true
  notify: restart sshd
  when: bootstrap_disable_password_auth

- name: Disable challenge-response auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication'
    line: 'ChallengeResponseAuthentication no'
  become: true
  notify: restart sshd
  when: bootstrap_disable_password_auth

- name: Install fail2ban
  apt:
    name: fail2ban
    state: present
    update_cache: yes
  become: true
  when:
    - bootstrap_install_fail2ban
    - ansible_facts['os_family'] == "Debian"

- name: Ensure fail2ban is running
  systemd:
    name: fail2ban
    state: started
    enabled: yes
  become: true
  when:
    - bootstrap_install_fail2ban
    - ansible_facts['os_family'] == "Debian"

- name: Install unattended-upgrades
  apt:
    name: unattended-upgrades
    state: present
  become: true
  when: bootstrap_install_unattended_upgrades

- name: Configure unattended-upgrades (security only, no auto-reboot)
  template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
  become: true
  when: bootstrap_install_unattended_upgrades

- name: Enable the periodic update/upgrade timer
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
  become: true
  when: bootstrap_install_unattended_upgrades
